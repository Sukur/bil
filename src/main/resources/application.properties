spring.application.name=bil
server.port=${PORT:8080}

# --- Database (H2 default for dev; switch profile=prod for Postgres) ---
spring.datasource.url=jdbc:h2:file:${H2_DATA_PATH:./data/bil}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# H2 console for inspection during dev
spring.h2.console.enabled=true
spring.h2.console.path=/h2

# --- Liquibase ---
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true

# --- File upload limits (Excel ratesheets can be 1-10MB) ---
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# --- Swagger UI ---
springdoc.swagger-ui.path=/swagger
springdoc.api-docs.path=/v3/api-docs

# --- Logging ---
logging.level.com.bil=DEBUG
logging.level.org.hibernate.SQL=INFO

# --- Dev error details ---
server.error.include-message=always

